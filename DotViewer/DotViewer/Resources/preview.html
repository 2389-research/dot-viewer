<!DOCTYPE html>
<!-- ABOUTME: HTML shell for displaying SVG output from Graphviz rendering. -->
<!-- ABOUTME: Supports zoom, pan, light/dark theme, node highlighting, and click-to-select. -->
<html>
<head>
<meta charset="utf-8">
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        background: #f5f5f5;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        cursor: grab;
    }
    @media (prefers-color-scheme: dark) {
        body { background: #1e1e1e; }
    }
    body.dragging { cursor: grabbing; }
    #viewport {
        transform-origin: 0 0;
        position: absolute;
    }
    #container {
        display: inline-block;
        padding: 40px;
    }
    #container svg {
        display: block;
    }

    /* Dark mode SVG color inversion for default Graphviz colors */
    @media (prefers-color-scheme: dark) {
        #container svg .graph > polygon { fill: transparent !important; }
        #container svg text[fill="black"],
        #container svg text[fill="#000000"] { fill: #d4d4d4 !important; }
        #container svg [stroke="black"] { stroke: #d4d4d4 !important; }
        #container svg .edge polygon[fill="black"] { fill: #d4d4d4 !important; }
    }
    /* Light mode: make graph background transparent so page bg shows */
    #container svg .graph > polygon { fill: transparent !important; }

    /* Highlighted node/edge styling — fill the whole shape */
    #container svg .node.active > ellipse,
    #container svg .node.active > polygon,
    #container svg .node.active > path {
        stroke: #007AFF !important;
        stroke-width: 3px !important;
        fill: rgba(0, 122, 255, 0.15) !important;
    }
    #container svg .node.active > text {
        fill: #007AFF !important;
        font-weight: bold;
    }
    #container svg .edge.active > path {
        stroke: #007AFF !important;
        stroke-width: 3px !important;
    }
    #container svg .edge.active > polygon {
        stroke: #007AFF !important;
        fill: #007AFF !important;
    }
    #container svg .edge.active > text {
        fill: #007AFF !important;
    }

    /* Clickable node cursor */
    #container svg .node,
    #container svg .edge {
        cursor: pointer;
    }

    #error {
        color: #ff6b6b;
        font-family: -apple-system, sans-serif;
        font-size: 14px;
        padding: 20px;
        white-space: pre-wrap;
        display: none;
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: rgba(30, 30, 30, 0.9);
    }
    #zoom-info {
        position: fixed;
        bottom: 8px;
        right: 8px;
        color: rgba(128, 128, 128, 0.6);
        font-family: -apple-system, sans-serif;
        font-size: 11px;
        pointer-events: none;
    }
</style>
</head>
<body>
    <div id="viewport">
        <div id="container"></div>
    </div>
    <div id="error"></div>
    <div id="zoom-info"></div>
    <script>
        let scale = 1;
        let translateX = 0;
        let translateY = 0;
        let isDragging = false;
        let dragStartX = 0;
        let dragStartY = 0;
        let dragStartTranslateX = 0;
        let dragStartTranslateY = 0;

        const viewport = document.getElementById('viewport');
        const zoomInfo = document.getElementById('zoom-info');

        function applyTransform() {
            viewport.style.transform =
                `translate(${translateX}px, ${translateY}px) scale(${scale})`;
            zoomInfo.textContent = `${Math.round(scale * 100)}%`;
        }

        function fitToView() {
            const container = document.getElementById('container');
            const svg = container.querySelector('svg');
            if (!svg) return;

            const svgRect = svg.getBoundingClientRect();
            const bodyW = window.innerWidth;
            const bodyH = window.innerHeight;

            // Calculate scale to fit with padding
            const padding = 40;
            const scaleX = (bodyW - padding * 2) / (svgRect.width / scale);
            const scaleY = (bodyH - padding * 2) / (svgRect.height / scale);
            scale = Math.min(scaleX, scaleY, 2); // cap at 200%

            // Center the content
            const contentW = (svgRect.width / (svgRect.width / (svgRect.width / scale))) * scale;
            const contentH = (svgRect.height / (svgRect.height / (svgRect.height / scale))) * scale;

            // Simpler: reset and measure
            const rawW = svg.getBBox().width + 80; // padding
            const rawH = svg.getBBox().height + 80;
            translateX = (bodyW - rawW * scale) / 2;
            translateY = (bodyH - rawH * scale) / 2;

            applyTransform();
        }

        // Zoom with scroll wheel
        document.addEventListener('wheel', function(e) {
            e.preventDefault();

            const zoomFactor = e.deltaY > 0 ? 0.9 : 1.1;
            const newScale = Math.max(0.05, Math.min(10, scale * zoomFactor));

            // Zoom toward mouse position
            const mouseX = e.clientX;
            const mouseY = e.clientY;
            translateX = mouseX - (mouseX - translateX) * (newScale / scale);
            translateY = mouseY - (mouseY - translateY) * (newScale / scale);
            scale = newScale;

            applyTransform();
        }, { passive: false });

        // Pan with mouse drag
        document.addEventListener('mousedown', function(e) {
            if (e.button !== 0) return;
            isDragging = true;
            dragStartX = e.clientX;
            dragStartY = e.clientY;
            dragStartTranslateX = translateX;
            dragStartTranslateY = translateY;
            document.body.classList.add('dragging');
        });

        document.addEventListener('mousemove', function(e) {
            if (!isDragging) return;
            translateX = dragStartTranslateX + (e.clientX - dragStartX);
            translateY = dragStartTranslateY + (e.clientY - dragStartY);
            applyTransform();
        });

        document.addEventListener('mouseup', function() {
            isDragging = false;
            document.body.classList.remove('dragging');
        });

        // Double-click to fit to view
        document.addEventListener('dblclick', function() {
            fitToView();
        });

        // Keyboard shortcuts
        document.addEventListener('keydown', function(e) {
            if (e.key === '0' && (e.metaKey || e.ctrlKey)) {
                e.preventDefault();
                scale = 1;
                translateX = 0;
                translateY = 0;
                applyTransform();
                setTimeout(fitToView, 10);
            }
        });

        function updateSVG(svgString) {
            const container = document.getElementById('container');
            const error = document.getElementById('error');
            container.innerHTML = svgString;
            container.style.display = 'inline-block';
            error.style.display = 'none';

            // Remove fixed dimensions from SVG so it scales naturally
            const svg = container.querySelector('svg');
            if (svg) {
                svg.removeAttribute('width');
                svg.removeAttribute('height');
                // Use viewBox for sizing if available, otherwise set a reasonable size
                if (!svg.getAttribute('viewBox')) {
                    const bbox = svg.getBBox();
                    svg.setAttribute('viewBox', `${bbox.x} ${bbox.y} ${bbox.width} ${bbox.height}`);
                }
                svg.style.width = svg.viewBox.baseVal.width + 'px';
                svg.style.height = svg.viewBox.baseVal.height + 'px';
            }

            // Add click handlers to nodes and edges
            addClickHandlers();

            // Start at 100% zoom, aligned to top-left
            setTimeout(function() {
                scale = 1;
                translateX = 0;
                translateY = 0;
                applyTransform();
            }, 10);
        }

        function addClickHandlers() {
            const groups = document.querySelectorAll('#container svg .node, #container svg .edge');
            groups.forEach(function(g) {
                g.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const title = g.querySelector('title');
                    if (title && window.webkit && window.webkit.messageHandlers &&
                        window.webkit.messageHandlers.nodeClicked) {
                        window.webkit.messageHandlers.nodeClicked.postMessage(
                            title.textContent.trim()
                        );
                    }
                });
            });
        }

        function highlightNode(nodeId) {
            clearHighlights();
            if (!nodeId) return;

            // Highlight matching nodes
            document.querySelectorAll('#container svg .node').forEach(function(g) {
                const title = g.querySelector('title');
                if (title && title.textContent.trim() === nodeId) {
                    g.classList.add('active');
                }
            });

            // Highlight edges connected to this node
            document.querySelectorAll('#container svg .edge').forEach(function(g) {
                const title = g.querySelector('title');
                if (title) {
                    const parts = title.textContent.trim().split(/->|--/);
                    if (parts.some(function(p) { return p.trim() === nodeId; })) {
                        g.classList.add('active');
                    }
                }
            });
        }

        function clearHighlights() {
            document.querySelectorAll('#container svg .active').forEach(function(el) {
                el.classList.remove('active');
            });
        }

        function showError(message) {
            const error = document.getElementById('error');
            error.textContent = message;
            error.style.display = 'block';
        }
    </script>
</body>
</html>
