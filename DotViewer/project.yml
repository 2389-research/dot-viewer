# ABOUTME: XcodeGen project specification for the DotViewer macOS app.
# ABOUTME: Configures build settings, linking to the Rust static library, and UTI declarations.

name: DotViewer
options:
  bundleIdPrefix: com.2389
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.9.0
targets:
  DotViewer:
    type: application
    platform: macOS
    sources:
      - path: DotViewer
        excludes:
          - "Generated/include/**"
          - "Generated/dot_coreFFI.h"
          - "Generated/dot_coreFFI.modulemap"
          - "Generated/dot_parserFFI.h"
          - "Generated/dot_parserFFI.modulemap"
    dependencies:
      - package: Sparkle
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.2389.dot-viewer
        PRODUCT_NAME: "Dot Viewer"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        SWIFT_VERSION: "5.10"
        GENERATE_INFOPLIST_FILE: false
        INFOPLIST_FILE: "DotViewer/Info.plist"
        CODE_SIGN_ENTITLEMENTS: "DotViewer/DotViewer.entitlements"
        CODE_SIGN_STYLE: "Automatic"
        DEFINES_MODULE: true
        PRODUCT_MODULE_NAME: "DotViewer"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        OTHER_LDFLAGS:
          - "-ldot_core"
          - "-lexpat"
          - "-lz"
          - "-lc++"
        LIBRARY_SEARCH_PATHS:
          - "$(PROJECT_DIR)/../dot-core/target/release"
        SWIFT_INCLUDE_PATHS:
          - "$(PROJECT_DIR)/DotViewer/Generated/include"
        HEADER_SEARCH_PATHS:
          - "$(PROJECT_DIR)/DotViewer/Generated/include"
        SPARKLE_FEED_URL: ""
        SPARKLE_PUBLIC_ED_KEY: ""
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
      # Always link the release Rust library to match the generated UniFFI bindings.
      # The bindings contain checksums that must match the linked library exactly.
    entitlements:
      path: DotViewer/DotViewer.entitlements

  DotViewerTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: DotViewerTests
    dependencies:
      - target: DotViewer
    settings:
      base:
        SWIFT_VERSION: "5.10"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        GENERATE_INFOPLIST_FILE: true
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Dot Viewer.app/Contents/MacOS/Dot Viewer"
        BUNDLE_LOADER: "$(TEST_HOST)"
        SWIFT_INCLUDE_PATHS:
          - "$(PROJECT_DIR)/DotViewer/Generated/include"
        HEADER_SEARCH_PATHS:
          - "$(PROJECT_DIR)/DotViewer/Generated/include"

  DotViewerUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: DotViewerUITests
    dependencies:
      - target: DotViewer
    settings:
      base:
        SWIFT_VERSION: "5.10"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        GENERATE_INFOPLIST_FILE: true
